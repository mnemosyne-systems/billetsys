quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:billetsys;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file
app.public-base-url=http://localhost:8081
cap.api.endpoint=
cap.siteverify.url=
cap.secret.key=

quarkus.oidc.enabled=false
quarkus.oidc.tenant-enabled=false

quarkus.test.security.enable=true

quarkus.http.auth.permission.public.paths=/api/public/*,/api/app/session,/api/cap/*,/health/*,/metrics
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.priority=1

quarkus.http.auth.permission.authenticated.paths=/api/*,/articles/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.authenticated.priority=2

quarkus.log.category."io.quarkus.oidc".level=ERROR
quarkus.log.category."io.quarkus.security".level=ERROR